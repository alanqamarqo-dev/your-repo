name: CI - light

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ feat/agl-batch3-env-switches ]

jobs:
  import-smoke-and-tests:
    runs-on: ubuntu-latest
    name: Import smoke + quick tests
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install minimal requirements (no heavy embedding deps)
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Import smoke
        run: |
          python -c "import importlib; importlib.invalidate_caches(); importlib.import_module('Core_Memory.Conscious_Bridge'); print('IMPORT_BRIDGE_OK')"

      - name: Run focused tests
        run: |
          python -m pytest -q tests/test_*env_overrides* tests/test_retriever_blend_alpha.py
