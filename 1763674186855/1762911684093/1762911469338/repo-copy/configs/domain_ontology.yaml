---
# Domain ontology for AGL: domains, keywords, units, structures, canonical formulas, validation hints
domains:
  quantum:
    display: "Quantum Mechanics"
    keywords: ["ψ", "rho", "ρ", "ハミルトニアン", "hamiltonian", "H", "U", "unitary", "measurement", "ket", "bra", "|" ]
    symbols: ["ψ", "ρ", "H", "U", "|\u00B7\u27E8", "〉", "〈"]
    units: ["unitless", "Hz", "s", "J"]
    structures: ["state", "operator", "matrix", "tensor"]
    constraints: ["unitarity", "trace_one", "positive_semidefinite"]
    examples:
      - "probability of measuring |1> after U on |ψ>"

  physics.mechanics:
    display: "Classical Mechanics"
    keywords: ["force", "momentum", "energy", "work", "m", "v", "g", "k", "F", "p"]
    units: ["N", "J", "kg", "m", "s", "m/s", "m/s^2"]
    structures: ["vector", "scalar", "matrix"]
    constraints: ["conservation_energy", "conservation_momentum"]

  math.algebra:
    display: "Algebra & Linear Algebra"
    keywords: ["matrix", "det", "trace", "eigen", "polynomial", "degree", "coeff"]
    units: ["unitless"]
    structures: ["matrix", "polynomial", "tensor"]
    constraints: ["dimensions_compatible"]

  chemistry:
    display: "Chemistry"
    keywords: ["->", "⇌", "k", "Keq", "reactant", "product", "balance", "stoichiometry"]
    units: ["mol", "mol/L", "s", "M"]
    structures: ["reaction", "species", "stoichiometry"]
    constraints: ["conserve_atoms", "conserve_charge"]

  electrical:
    display: "Electrical / Circuits"
    keywords: ["ohm", "V", "I", "R", "RC", "RL", "Laplace", "impedance"]
    units: ["V", "A", "Ω", "F", "H", "s"]
    structures: ["circuit", "component", "transfer_function"]
    constraints: ["kirchhoff_current", "kirchhoff_voltage", "units_consistent"]

# mapping of unit aliases
units_aliases:
  V: ["volt", "فولت"]
  A: ["amp", "أمبير"]
  Ohm: ["Ω", "أوم"]
