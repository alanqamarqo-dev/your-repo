name: AGI smoke checks

on:
  push:
    branches: [ master, "**" ]
  pull_request:
    branches: [ master ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt || true; fi

      - name: Run integration cohesion check
        run: |
          python scripts/integration_cohesion_check.py

      - name: Run AGI smoke tests (fast)
        run: |
          python -m pytest -q tests/agi -k smoke || true
