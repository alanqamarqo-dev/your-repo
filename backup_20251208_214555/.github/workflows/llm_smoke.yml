name: LLM Smoke & Integration

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      AGL_FEATURE_ENABLE_RAG: "1"
      AGL_LLM_PROVIDER: "http"
      AGL_LLM_BASEURL: "http://127.0.0.1:11434"
      AGL_LLM_MODEL: "qwen2.5:3b-instruct"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt || true

      - name: LLM ping (try real)
        id: ping
        continue-on-error: true
        run: |
          python quick_llm_ping.py --base "$AGL_LLM_BASEURL" --model "$AGL_LLM_MODEL"

      - name: Decide mock fallback
        id: decide
        run: |
          if [ "${{ steps.ping.outcome }}" = "success" ]; then
            echo "use_mock=false" >> $GITHUB_OUTPUT
            echo "LLM reachable"
          else
            echo "use_mock=true" >> $GITHUB_OUTPUT
            echo "AGL_OLLAMA_KB_MOCK=1" >> $GITHUB_ENV
            echo "AGL_EXTERNAL_INFO_MOCK=1" >> $GITHUB_ENV
            echo "Falling back to mock"
          fi

      - name: Run smoke tests
        run: |
          pytest -q -m "smoke" -s

      - name: Run integration tests
        run: |
          pytest -q -m "integration" -s
