system:
  operational_mode: "supervised_autonomy"
  learning_enabled: true
  safety_protocols: "enabled"

knowledge:
  persistence: true
  storage_path: "./knowledge_base"
engines:
  perception_context:
    enabled: true
    weight: 1.0
  reasoning_planner:
    enabled: true
    weight: 1.2
features:
  enable_self_improvement: false   # enable the self-learning loop (set true to activate)
  enable_meta_cognition: false    # enable meta-cognition / review of internal reasoning
  persist_memory: true            # whether to persist long-term memory to disk
  enable_quantum_neural_core: false
  enable_adv_exp_algebra: false