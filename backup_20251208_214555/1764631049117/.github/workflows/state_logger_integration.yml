name: StateLogger Integration Test

on:
  push:
  pull_request:

jobs:
  test-state-logger:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest

      - name: Setup AGL snapshot env
        env:
          AGL_C_LAYER_SNAPSHOTS: '1'
          AGL_SNAPSHOT_ASYNC: '1'
          AGL_C_LAYER_BRIDGE_WRITE: '1'
          AGL_SANITIZE_SNAPSHOTS: '1'
          AGL_SNAPSHOT_RETENTION_DAYS: '0'
          AGL_SNAPSHOT_COMPRESS_OLD: '0'
          AGL_SNAPSHOT_ROTATE_STRATEGY: 'count'
          AGL_SNAPSHOT_QUEUE_MAX: '64'
        run: |
          echo "AGL snapshot env vars set"

      - name: Run StateLogger Integration Test
        run: |
          python -m pytest -q tests/test_state_logger_bridge_integration.py -q
