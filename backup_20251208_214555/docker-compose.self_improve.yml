version: '3.8'
services:
  self_improve_sandbox:
    image: python:3.11-slim
    container_name: agl_self_improve_sandbox
    working_dir: /work
    # Keep container running but do not automatically execute repo code
    entrypoint: ["tail", "-f", "/dev/null"]
    network_mode: "none"   # disable network completely
    volumes:
      # mount repository read-only to avoid accidental overwrites
      - ./:/work:ro
      # artifacts volume writable so tests/sandbox can drop safe outputs
      - ./artifacts:/artifacts:rw
    tmpfs:
      - /tmp
    environment:
      - PYTHONUNBUFFERED=1
    # remove capabilities and restrict privileges
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # resource constraints (may be limited by local docker config)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    stdin_open: true
    tty: true

# Notes:
# - This compose file keeps the container idle; exec into it to run sandboxed commands.
# - Network is disabled to prevent external access. The repo is mounted read-only.
# - To test changes, create a separate runner script that writes only into /artifacts.
