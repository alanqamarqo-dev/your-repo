name: "CI - Tests and Lint"

on:
  push:
    branches: [master, agl_security, develop]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/..
        run: |
          python -m pytest tests/ -x -q --tb=short

  lint:
    name: Lint & Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Check imports
        run: python -c "import agl_security_tool; print(f'v{agl_security_tool.__version__} OK')"

      - name: Check CLI entry point
        run: python -m agl_security_tool --version

  integration:
    name: Integration (with external tools)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install slither-analyzer || true
          pip install semgrep || true

      - name: Install solc
        run: |
          pip install solc-select
          solc-select install 0.8.20
          solc-select use 0.8.20

      - name: Run full test suite (including slow)
        env:
          PYTHONPATH: ${{ github.workspace }}/..
        run: |
          python -m pytest tests/ -x -q --tb=short -m ""
