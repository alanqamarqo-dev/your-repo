name: CI Smoke

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install deps (best effort)
        shell: bash
        run: |
          python -m pip install -U pip wheel setuptools pytest || true
          # لو عندك requirements.txt:
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt || true
          fi

      - name: Prepare CI env
        shell: bash
        run: |
          echo "MPLBACKEND=Agg"                         >> $GITHUB_ENV
          echo "PYTHONUTF8=1"                           >> $GITHUB_ENV
          echo "PYTHONIOENCODING=utf-8"                 >> $GITHUB_ENV
          echo "AGL_TEST_SKIP_MATPLOTLIB=1"             >> $GITHUB_ENV
          echo "AGL_EXTERNAL_INFO_MOCK=1"               >> $GITHUB_ENV
          echo "AGL_TEST_SCAFFOLD_FORCE=1"              >> $GITHUB_ENV
          echo "AGL_LLM_PROVIDER=ollama"                >> $GITHUB_ENV
          echo "AGL_LLM_BASEURL=http://localhost:11434" >> $GITHUB_ENV

      - name: Run smoke tests
        shell: powershell
        run: |
          if (-Not (Test-Path "scripts\ci_smoke.ps1")) {
            Write-Host "ci_smoke.ps1 not found; creating a temporary one..."
            New-Item -ItemType Directory -Force -Path "scripts" | Out-Null
            @'
# (نسخة مبسطة) — تُطابق ما أرسلته لك أعلاه
$env:MPLBACKEND="Agg"
$env:PYTHONUTF8="1"
$env:PYTHONIOENCODING="utf-8"
$env:AGL_TEST_SKIP_MATPLOTLIB="1"
$env:AGL_EXTERNAL_INFO_MOCK="1"
$env:AGL_TEST_SCAFFOLD_FORCE="1"
py -3 -m pytest -q -k "smoke or quick or basic"
exit $LASTEXITCODE
'@ | Out-File -FilePath "scripts\ci_smoke.ps1" -Encoding UTF8 -Force
          }
          powershell -ExecutionPolicy Bypass -File scripts\ci_smoke.ps1

      - name: Upload pytest cache on failure (debug)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-artifacts
          path: |
            .pytest_cache
            tests_run_output.txt
            reports/**
